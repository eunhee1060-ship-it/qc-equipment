<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>설비 관리 시스템 | QC팀</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root { color-scheme: light only; }

  html, body {
    color-scheme: light only !important;
    background-color: #f0f4f9 !important;
    color: #1e293b !important;
  }

  @media (prefers-color-scheme: dark) {
    html, body { background-color: #f0f4f9 !important; color: #1e293b !important; }
    * { color-scheme: light only !important; }
    .app-header { background: #ffffff !important; }
    .card, .eq-card, .stat-card, .modal, .detail-header { background: #ffffff !important; color: #1e293b !important; border-color: #e2e8f0 !important; }
    .eq-card-name, .detail-title, .meta-value, .stat-num { color: #1e293b !important; }
    .eq-card-model, .eq-card-date, .meta-label, .stat-label, .text-muted { color: #64748b !important; }
    input, select, textarea { background: #ffffff !important; color: #1e293b !important; border-color: #e2e8f0 !important; }
    .search-box { background: #ffffff !important; color: #1e293b !important; }
    .btn-secondary { background: #ffffff !important; color: #1e293b !important; border-color: #e2e8f0 !important; }
    .check-table th { background: #f7f9fc !important; color: #64748b !important; }
    .check-table td { color: #1e293b !important; }
    .log-card { background: #f7f9fc !important; }
    .manual-box { background: #f7f9fc !important; color: #1e293b !important; }
    .inner-tabs { background: #ffffff !important; }
    .inner-tab { color: #64748b !important; }
    .modal-footer { background: #f7f9fc !important; }
  }

  :root {
    --bg: #f0f4f9;
    --surface: #ffffff;
    --surface2: #f7f9fc;
    --border: #e2e8f0;
    --border-light: #eef2f7;
    --text: #1e293b;
    --text-muted: #64748b;
    --text-light: #94a3b8;
    --accent: #2a5298;
    --accent2: #2a5298;
    --accent-light: #e8edf7;
    --accent-mid: #c5d4ef;
    --ok: #059669;
    --ok-bg: #ecfdf5;
    --warn: #dc2626;
    --warn-bg: #fef2f2;
    --warn-mid: #fecaca;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 6px 20px rgba(0,0,0,0.05);
    --shadow-lg: 0 4px 6px rgba(0,0,0,0.05), 0 10px 40px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

  /* ===== HEADER ===== */
  .app-header {
    background: #ffffff;
    color: #2a5298; padding: 0 32px; height: 72px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(42,82,152,0.12);
    border-bottom: 1px solid #e2e8f0;
  }
  .header-brand { display: flex; align-items: center; gap: 16px; }
  .header-divider { width: 1px; height: 42px; background: #e0e0e0; }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: #2a5298; }
  .header-sub { font-size: 12px; color: #999; margin-top: 3px; }

  .nav-tabs { display: flex; gap: 2px; background: #f0f4f9; border-radius: 10px; padding: 3px; }
  .nav-tab {
    padding: 6px 16px; border-radius: 8px; border: none; cursor: pointer;
    font-family: inherit; font-size: 13px; font-weight: 500; transition: all 0.2s;
    color: #555; background: transparent;
  }
  .nav-tab:hover { color: #2a5298; background: white; }
  .nav-tab.active { background: #2a5298; color: white; font-weight: 600; box-shadow: 0 2px 8px rgba(42,82,152,0.3); }

  /* ===== LAYOUT ===== */
  .view { display: none; padding: 28px; max-width: 1140px; margin: 0 auto; }
  .view.active { display: block; }

  /* ===== CARDS ===== */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-light); }

  /* ===== STATS ===== */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); position: relative; overflow: hidden;
  }
  .stat-card::after { content: ''; position: absolute; right: -10px; top: -10px; width: 70px; height: 70px; border-radius: 50%; background: var(--accent-light); opacity: 0.5; }
  .stat-num { font-size: 30px; font-weight: 700; line-height: 1; letter-spacing: -1px; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; font-weight: 500; }

  /* ===== TOOLBAR ===== */
  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
  .toolbar-left { display: flex; gap: 8px; align-items: center; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 14px; }
  .search-box { padding: 9px 14px 9px 36px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; background: var(--surface); width: 240px; outline: none; transition: all 0.2s; box-shadow: var(--shadow-sm); }
  .search-box:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

  /* ===== BUTTONS ===== */
  .btn { padding: 9px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.2px; }
  .btn-primary { background: linear-gradient(135deg, #1e3a6e, #2a5298); color: white; box-shadow: 0 2px 8px rgba(42,82,152,0.3); }
  .btn-primary:hover { background: linear-gradient(135deg, #17306e, #234a8a); box-shadow: 0 4px 12px rgba(42,82,152,0.4); transform: translateY(-1px); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); box-shadow: var(--shadow-sm); }
  .btn-secondary:hover { background: var(--surface2); border-color: var(--accent-mid); color: var(--accent); }
  .btn-danger { background: var(--warn-bg); color: var(--warn); border: 1.5px solid var(--warn-mid); }
  .btn-danger:hover { background: #fee2e2; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  /* ===== EQ GRID ===== */
  .eq-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; margin-top: 20px; }
  .eq-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; cursor: pointer; transition: all 0.25s; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .eq-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, #1d4ed8, #2563eb); border-radius: var(--radius) 0 0 var(--radius); }
  .eq-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--accent-mid); }
  .eq-card.status-warn::before { background: linear-gradient(180deg, #dc2626, #ef4444); }
  .eq-card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; letter-spacing: -0.3px; }
  .eq-card-model { font-size: 11px; color: var(--text-light); margin-bottom: 14px; font-family: 'JetBrains Mono', monospace; background: var(--surface2); display: inline-block; padding: 2px 8px; border-radius: 4px; }
  .eq-card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 600; }
  .badge-dept { background: var(--accent-light); color: var(--accent2); border: 1px solid var(--accent-mid); }
  .badge-ok { background: var(--ok-bg); color: var(--ok); border: 1px solid #a7f3d0; }
  .badge-warn { background: var(--warn-bg); color: var(--warn); border: 1px solid var(--warn-mid); }
  .eq-card-date { font-size: 11px; color: var(--text-light); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }

  /* ===== MODAL ===== */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); border: 1px solid var(--border); }
  .modal-header { padding: 22px 26px 18px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 16px 16px 0 0; }
  .modal-header h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .modal-body { padding: 22px 26px; }
  .modal-footer { padding: 16px 26px; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 8px; background: var(--surface2); border-radius: 0 0 16px 16px; }
  .close-btn { background: var(--surface2); border: 1px solid var(--border); font-size: 16px; cursor: pointer; color: var(--text-muted); width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .close-btn:hover { background: var(--border); color: var(--text); }

  /* ===== FORM ===== */
  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  input, select, textarea { width: 100%; padding: 10px 13px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; background: var(--surface); outline: none; transition: all 0.2s; color: var(--text); }
  input:focus, select:focus, textarea:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  select { cursor: pointer; }

  /* ===== DETAIL ===== */
  .detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 18px; box-shadow: var(--shadow); }
  .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: -0.5px; }
  .detail-model { font-size: 12px; color: var(--text-light); font-family: 'JetBrains Mono', monospace; background: var(--surface2); display: inline-block; padding: 3px 10px; border-radius: 5px; margin-bottom: 16px; border: 1px solid var(--border); }
  .detail-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .meta-label { font-size: 11px; color: var(--text-light); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .meta-value { font-size: 13px; font-weight: 500; }

  /* ===== INNER TABS ===== */
  .inner-tabs { display: flex; gap: 0; margin-bottom: 18px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px; box-shadow: var(--shadow-sm); }
  .inner-tab { padding: 8px 18px; border-radius: 6px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; flex: 1; text-align: center; }
  .inner-tab.active { background: #2a5298; color: white !important; font-weight: 600; box-shadow: 0 2px 8px rgba(42,82,152,0.3); }
  .inner-tab:hover:not(.active) { color: var(--accent); background: var(--accent-light); }
  .inner-content { display: none; }
  .inner-content.active { display: block; }

  /* ===== TABLE ===== */
  .check-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .check-table th { background: var(--surface2); padding: 11px 14px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); border-bottom: 1px solid var(--border); }
  .check-table td { padding: 12px 14px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
  .check-table tr:last-child td { border-bottom: none; }
  .check-table tr:hover td { background: var(--surface2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .dot-ok { background: var(--ok); }
  .dot-warn { background: var(--warn); }

  /* ===== QR ===== */
  .qr-section { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px; background: var(--surface2); border: 1.5px dashed var(--border); border-radius: var(--radius-sm); }

  /* ===== SECTION TITLE ===== */
  .section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border-light); }

  /* ===== ALERT ===== */
  .alert-info { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); border-radius: var(--radius-sm); padding: 11px 14px; font-size: 13px; margin-bottom: 14px; }

  /* ===== MANUAL ===== */
  .manual-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; font-size: 13px; line-height: 1.8; }

  /* ===== QR PRINT ===== */
  .qr-print-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
  .qr-print-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; display: flex; flex-direction: column; align-items: center; gap: 8px; background: white; box-shadow: var(--shadow-sm); transition: all 0.2s; }
  .qr-print-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .qr-print-name { font-size: 12px; font-weight: 700; text-align: center; }
  .qr-print-sub { font-size: 10px; color: var(--text-muted); text-align: center; }

  /* ===== LOADING ===== */
  .loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--text-muted); font-size: 14px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== EMPTY ===== */
  .empty-state { text-align: center; padding: 56px 24px; color: var(--text-muted); }
  .empty-state .icon { font-size: 44px; margin-bottom: 14px; opacity: 0.5; }
  .empty-state p { font-size: 14px; }

  /* ===== MOBILE CARDS ===== */
  .log-card-list { display: flex; flex-direction: column; gap: 10px; padding: 12px; }
  .log-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; }
  .log-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .log-card-date { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--accent); background: var(--accent-light); padding: 2px 8px; border-radius: 4px; }
  .log-card-person { font-size: 12px; color: var(--text-muted); }
  .log-card-body { display: flex; flex-direction: column; gap: 6px; }
  .log-card-row { display: flex; gap: 8px; font-size: 12px; align-items: flex-start; }
  .log-card-label { color: var(--text-light); font-weight: 600; min-width: 70px; flex-shrink: 0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; padding-top: 1px; }
  .log-card-value { flex: 1; }
  .log-card-actions { display: flex; gap: 6px; margin-top: 12px; justify-content: flex-end; padding-top: 10px; border-top: 1px solid var(--border-light); }

  @media print {
    .app-header, .toolbar, .btn, .nav-tabs { display: none !important; }
    .view { display: block !important; padding: 0; }
  }
  @media (max-width: 700px) {
    .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .detail-meta-grid { grid-template-columns: 1fr 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .view { padding: 14px; }
    .check-table { display: none; }
    .log-card-list { display: flex; }
    .detail-header { padding: 16px; }
    .detail-title { font-size: 18px; }
    .inner-tab { padding: 7px 6px; font-size: 11px; }
    .app-header { padding: 0 12px; height: 54px; }
    .header-brand { gap: 8px; }
    .header-brand img { width: 34px !important; height: 34px !important; }
    .header-title { font-size: 14px !important; letter-spacing: 1.5px !important; }
    .header-sub { font-size: 10px !important; }
    .header-divider { display: none; }
    .nav-tabs { gap: 1px; padding: 2px; }
    .nav-tab { padding: 5px 8px; font-size: 11px; }
  }
  @media (min-width: 701px) {
    .log-card-list { display: none; }
  }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .close-btn:hover { background: var(--surface2); }

  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.3px; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 7px; font-family: inherit; font-size: 13px; background: var(--surface); outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 70px; }

  .detail-header { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .detail-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .detail-model { font-size: 13px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 12px; }
  .detail-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px; }
  .meta-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
  .meta-value { font-size: 13px; font-weight: 500; margin-top: 2px; }

  .check-table th { background: var(--surface2); padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  .check-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .check-table tr:last-child td { border-bottom: none; }
  .check-table tr:hover td { background: var(--surface2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .dot-ok { background: var(--ok); }
  .dot-warn { background: var(--warn); }

  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); }
  .stat-num { font-size: 28px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  .inner-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .inner-content { display: none; }
  .inner-content.active { display: block; }

  .manual-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; }

<script>
const API = 'https://script.google.com/macros/s/AKfycbyf1oYXQYzCyq34A3L4gkzy0riL-yrztPTjGVc2YjbboiU0S00qJlSeBCRoFd87IjLd/exec';

let db = { equipment: [], checks: [], calibs: [] };
let currentEqId = null;
let editingEqId = null;

// ===== API =====
async function apiGet(params) {
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function apiPost(data) {
  const res = await fetch(API, {
    method: 'POST',
    body: JSON.stringify(data)
  });
  return res.json();
}

// ===== INIT =====
function cleanValue(v) {
  if (v instanceof Date) {
    // 날짜 객체면 YYYY.MM.DD 형식으로 변환
    return `${v.getFullYear()}.${String(v.getMonth()+1).padStart(2,'0')}.${String(v.getDate()).padStart(2,'0')}`;
  }
  if (typeof v === 'string' && v.includes('T00:00:00')) {
    return v.split('T')[0].replace(/-/g, '.');
  }
  return v;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const eqId = params.get('eq');

  const data = await apiGet({ action: 'getAll' });
  db = data;
  if (!db.calibs) db.calibs = [];

  if (eqId) {
    const eq = db.equipment.find(e => e.id === eqId);
    if (eq) { openDetail(eqId); return; }
  }
  showView('list');
}

// ===== VIEWS =====
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['list','qr','admin'].indexOf(name);
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (name === 'list') { renderStats(); renderList(); }
  if (name === 'qr') { renderQR(); }
  if (name === 'admin') { renderAdmin(); }
}

function showInnerTab(name, btn) {
  document.querySelectorAll('.inner-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.inner-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('inner-' + name).classList.add('active');
}

// ===== STATS =====
function renderStats() {
  const total = db.equipment.length;
  const now = new Date();
  const thisMonth = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}`;
  const recentChecked = new Set(db.checks.filter(c => c.date && c.date.startsWith(thisMonth)).map(c => c.eqId)).size;
  const totalChecks = db.checks.length;
  const warnCount = db.checks.filter(c => c.machine && c.machine !== '이상없음').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${total}</div><div class="stat-label">등록 설비 수</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--ok)">${totalChecks}</div><div class="stat-label">전체 점검 기록</div></div>
    <div class="stat-card"><div class="stat-num">${recentChecked}</div><div class="stat-label">이번 달 점검 완료</div></div>
    <div class="stat-card"><div class="stat-num" style="color:${warnCount>0?'var(--warn)':'var(--ok)'}">${warnCount}</div><div class="stat-label">이상 기록 수</div></div>
  `;
}

// ===== LIST =====
function renderList() {
  const q = (document.getElementById('search-input')?.value || '').toLowerCase();
  const filtered = db.equipment.filter(e => e.name.toLowerCase().includes(q) || (e.dept||'').toLowerCase().includes(q));
  const grid = document.getElementById('eq-grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>설비가 없어요. 새 설비를 등록해보세요!</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(eq => {
    const eqChecks = db.checks.filter(c => c.eqId === eq.id).sort((a,b) => b.date.localeCompare(a.date));
    const last = eqChecks[0];
    const hasWarn = last && last.machine !== '이상없음';
    return `
      <div class="eq-card ${hasWarn?'status-warn':''}" onclick="openDetail('${eq.id}')">
        <div class="eq-card-name">${eq.name}</div>
        <div class="eq-card-model">${eq.model||'-'} · ${eq.serial||'-'}</div>
        <div class="eq-card-meta">
          <span class="badge badge-dept">${eq.dept||'미지정'}</span>
          ${last ? `<span class="badge ${hasWarn?'badge-warn':'badge-ok'}">${hasWarn?'⚠ 이상':'✓ 정상'}</span>` : '<span class="badge" style="background:#f0f0f0;color:#999">점검전</span>'}
        </div>
        <div class="eq-card-date">최근 점검: ${last ? last.date : '—'} ${last ? '· '+last.person : ''}</div>
      </div>
    `;
  }).join('');
}

// ===== QR =====
function renderQR() {
  const grid = document.getElementById('qr-print-grid');
  if (db.equipment.length === 0) { grid.innerHTML = '<div class="empty-state"><div class="icon">📱</div><p>등록된 설비가 없어요.</p></div>'; return; }
  grid.innerHTML = db.equipment.map(eq => `
    <div class="qr-print-card">
      <div id="qr-${eq.id}"></div>
      <div class="qr-print-name">${eq.name}</div>
      <div class="qr-print-sub">${eq.dept||''}</div>
      <button class="btn btn-secondary btn-sm" onclick="downloadQR('${eq.id}','${eq.name}')">⬇ 저장</button>
    </div>
  `).join('');

  db.equipment.forEach(eq => {
    const url = `${location.origin}${location.pathname}?eq=${eq.id}`;
    new QRCode(document.getElementById('qr-'+eq.id), {
      text: url, width: 130, height: 130,
      colorDark: '#1a1714', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  });
}

function downloadQR(id, name) {
  setTimeout(() => {
    const canvas = document.querySelector(`#qr-${id} canvas`);
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = `QR_${name}.png`;
    a.href = canvas.toDataURL();
    a.click();
  }, 300);
}

// ===== MODALS =====
function convertDriveLink(url) {
  if (!url) return '';
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w600`;
  return url;
}

async function saveEquipment() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('설비명을 입력해주세요.'); return; }
  const btn = document.getElementById('btn-save-eq');
  btn.textContent = '저장 중...'; btn.disabled = true;
  const data = {
    name, model: document.getElementById('f-model').value.trim(),
    dept: document.getElementById('f-dept').value.trim(),
    manager: document.getElementById('f-manager').value.trim(),
    maker: document.getElementById('f-maker').value.trim(),
    serial: document.getElementById('f-serial').value.trim(),
    install: document.getElementById('f-install').value,
    location: document.getElementById('f-location').value.trim(),
    manual: document.getElementById('f-manual').value.trim(),
    photo: document.getElementById('f-photo').value.trim(),
    manualLink: db.equipment.find(e=>e.id===editingEqId)?.manualLink||'',
  };
  if (editingEqId) {
    data.action = 'editEquipment'; data.id = editingEqId;
    await apiPost(data);
    const idx = db.equipment.findIndex(e => e.id === editingEqId);
    db.equipment[idx] = { ...db.equipment[idx], ...data };
  } else {
    data.action = 'addEquipment';
    const res = await apiPost(data);
    db.equipment.push({ id: res.id, ...data });
  }
  btn.textContent = '저장'; btn.disabled = false;
  closeModal('modal-eq');
  if (editingEqId) openDetail(editingEqId);
  else { renderStats(); renderList(); }
}

function openCheckModal() {

// ===== 검교정 =====
let editingCalibId = null;

function renderCalibLog() {
  const calibs = (db.calibs||[]).filter(c => c.eqId === currentEqId).sort((a,b) => b.date.localeCompare(a.date));
  const container = document.getElementById('calib-log-container');
  if (!container) return;
  if (calibs.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔬</div><p>검교정 기록이 없어요.</p></div>`;

  }
  container.innerHTML = `
    <table class="check-table">
      <thead><tr><th>교정일</th><th>교정번호</th><th>차기교정일</th><th>담당자</th><th>메모</th><th></th></tr></thead>
      <tbody>
        ${calibs.map(c => `<tr>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;">${c.date}</td>
          <td style="font-family:'JetBrains Mono',monospace;font-size:12px;">${c.calNum||'-'}</td>
          <td style="font-size:12px;${isCalibExpiringSoon(c.nextDate)?'color:var(--warn);font-weight:600;':''}">${c.nextDate||'-'}</td>
          <td>${c.person}</td>
          <td style="color:var(--text-muted);font-size:12px;">${c.memo||'-'}</td>
          <td style="display:flex;gap:4px;">
            <button class="btn btn-secondary btn-sm" onclick="openCalibEditModal('${c.id}')">✏️</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCalib('${c.id}')">🗑</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    <div class="log-card-list">
      ${calibs.map(c => `
        <div class="log-card">
          <div class="log-card-header">
            <span class="log-card-date">${c.date}</span>
            <span class="log-card-person">👤 ${c.person}</span>
          </div>
          <div class="log-card-body">
            <div class="log-card-row">
              <span class="log-card-label">교정번호</span>
              <span class="log-card-value" style="font-family:'JetBrains Mono',monospace;">${c.calNum||'-'}</span>
            </div>
            <div class="log-card-row">
              <span class="log-card-label">차기교정일</span>
              <span class="log-card-value" style="${isCalibExpiringSoon(c.nextDate)?'color:var(--warn);font-weight:600;':''}">${c.nextDate||'-'}</span>
            </div>
            ${c.memo ? `<div class="log-card-row"><span class="log-card-label">메모</span><span class="log-card-value" style="color:var(--text-muted)">${c.memo}</span></div>` : ''}
          </div>
          <div class="log-card-actions">
            <button class="btn btn-secondary btn-sm" onclick="openCalibEditModal('${c.id}')">✏️ 수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCalib('${c.id}')">🗑 삭제</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function isCalibExpiringSoon(nextDate) {
  if (!nextDate) return false;
  try {
    const parts = nextDate.split('.');
    const d = new Date(parts[0], parts[1]-1, parts[2]);
    const diff = (d - new Date()) / (1000*60*60*24);
    return diff < 30;
  } catch(e) { return false; }
}

  };
  if (!db.calibs) db.calibs = [];
  if (editingCalibId) {
    payload.action = 'editCalib'; payload.id = editingCalibId;
    await apiPost(payload);
    const idx = db.calibs.findIndex(c => c.id === editingCalibId);
    db.calibs[idx] = { ...db.calibs[idx], ...payload };
  } else {
    payload.action = 'addCalib';
    const res = await apiPost(payload);
    db.calibs.push({ id: res.id || ('cal'+Date.now()), ...payload });
  }
  btn.textContent = '저장'; btn.disabled = false;

  const idx = db.equipment.findIndex(e => e.id === currentEqId);
  db.equipment[idx].manual = manual;
  db.equipment[idx].manualLink = manualLink;
  renderManualContent();
  btn.textContent = '저장'; btn.disabled = false;
  closeModal('modal-manual');

function renderManualContent() {
  const eq = db.equipment.find(e => e.id === currentEqId);
  const area = document.getElementById('manual-content-area');
  if (!area) return;
  let html = '';

  if (eq?.manualLink) {
    const link = eq.manualLink.trim();
    const fileId = extractDriveId(link);
    const isPdf = link.toLowerCase().includes('.pdf') || (fileId && !link.toLowerCase().includes('.doc'));

    if (fileId && isPdf) {
      // PDF 미리보기
      html += `
        <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;">
          <span style="font-size:13px;font-weight:600;">📄 첨부 문서</span>
          <a href="${link}" target="_blank" class="btn btn-secondary btn-sm">🔗 새 탭에서 열기</a>
        </div>
        <iframe src="https://drive.google.com/file/d/${fileId}/preview" 
          width="100%" height="500px" 
          style="border:1px solid var(--border);border-radius:8px;" 
          allow="autoplay">
        </iframe>
      `;
    } else {
      // 워드 등 미리보기 안 되는 파일
      html += `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:20px;text-align:center;margin-bottom:12px;">
          <div style="font-size:32px;margin-bottom:8px;">📎</div>
          <div style="font-size:14px;font-weight:600;margin-bottom:12px;">첨부 문서</div>
          <a href="${link}" target="_blank" class="btn btn-primary">🔗 문서 열기</a>
        </div>
      `;
    }
  }

  if (eq?.manual) {
    html += `<div class="manual-box" style="margin-top:${eq?.manualLink?'16px':'0'}">${eq.manual.replace(/\n/g,'<br>')}</div>`;
  }

  if (!eq?.manualLink && !eq?.manual) {
    html = '<div style="color:var(--text-muted);font-size:13px;">사용법이 아직 등록되지 않았어요.</div>';
  }

  area.innerHTML = html;
}

function extractDriveId(url) {
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  const m2 = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
  if (m2) return m2[1];
  return null;
}

async function deleteEquipment(id) {
  const eq = db.equipment.find(e => e.id === id);

document.querySelectorAll('.modal-overlay').forEach(o => {
